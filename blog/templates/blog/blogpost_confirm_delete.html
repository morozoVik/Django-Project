{% extends 'base.html' %}
{% load static %}

{% block title %}Удаление статьи - Блог Skystore{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="card">
                <div class="card-body">
                    <h2 class="card-title">Удаление статьи</h2>
                    <p>Вы уверены, что хотите удалить статью "{{ object.title }}"?</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">Да, удалить</button>
                            <a href="{% url 'blog:post_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
